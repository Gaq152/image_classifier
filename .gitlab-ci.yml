# 发布任务
release:
  stage: deploy
  image: registry.gddi.com/ops/release-cli:v0.14.0
  extends:
    - .is_deploy
  dependencies:
    - windows_build
    # - linux_build  # 如果需要Linux版本则取消注释
  script:
    - set -x
    
    # 设置认证
    - echo "machine gitlab.desauto.cn login gitlab-ci-token password $CI_JOB_TOKEN" > ~/.netrc
    
    # 检查构建产物
    - ls -la dist/
    - ls -la ./ | grep -E "\.(exe|linux)$" || true
    
    # 获取版本信息
    - VERSION=$(echo $CI_COMMIT_TAG | sed 's/^v//')
    - echo "发布版本: $VERSION"
    
    # 上传 Windows 版本
    - |
      WINDOWS_FILE=$(find dist -name "*.exe" -type f | head -1)
      if [ -f "$WINDOWS_FILE" ]; then
        echo "上传 Windows 版本: $WINDOWS_FILE"
        
        # 上传到指定版本目录
        curl --fail --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$WINDOWS_FILE" \
             "${PACKAGE_REGISTRY_URL}/$CI_COMMIT_TAG/$(basename $WINDOWS_FILE)"
             
        # 上传到 latest 目录
        curl --fail --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$WINDOWS_FILE" \
             "${PACKAGE_REGISTRY_URL}/latest/$(basename $WINDOWS_FILE)"
             
        echo "✓ Windows 版本上传成功"
      else
        echo "✗ 未找到 Windows exe 文件"
        exit 1
      fi
    
    # 上传 Linux 版本（如果存在）
    - |
      LINUX_FILE=$(find . -name "*linux" -type f | head -1)
      if [ -f "$LINUX_FILE" ]; then
        echo "上传 Linux 版本: $LINUX_FILE"
        chmod +x "$LINUX_FILE"
        
        # 上传到指定版本目录
        curl --fail --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$LINUX_FILE" \
             "${PACKAGE_REGISTRY_URL}/$CI_COMMIT_TAG/$(basename $LINUX_FILE)"
             
        # 上传到 latest 目录  
        curl --fail --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$LINUX_FILE" \
             "${PACKAGE_REGISTRY_URL}/latest/$(basename $LINUX_FILE)"
             
        echo "✓ Linux 版本上传成功"
      else
        echo "⚠ 未找到 Linux 版本文件（跳过）"
      fi
  
  # GitLab Release 配置
  release:
    tag_name: $CI_COMMIT_TAG
    name: '图像分类工具 $CI_COMMIT_TAG'
    description: |
      ## 🚀 图像分类工具 $CI_COMMIT_TAG 发布
      
      ### 📥 下载链接
      - **Windows 版本**: [图像分类工具_v${CI_COMMIT_TAG#v}.exe](${PACKAGE_REGISTRY_URL}/$CI_COMMIT_TAG/图像分类工具_v${CI_COMMIT_TAG#v}.exe)
      - **最新版本**: [latest](${PACKAGE_REGISTRY_URL}/latest/)
      
      ### 📋 系统要求
      - **操作系统**: Windows 7 及以上版本
      - **内存**: 4GB RAM 以上
      - **存储**: 200MB 可用空间
      
      ### 🎯 主要功能
      - 🖼️ 支持多种图片格式
      - 📁 智能分类管理
      - ⌨️ 丰富快捷键支持
      - 🔄 复制/移动双模式
      - 🎨 现代化用户界面
      
      ### 📝 更新说明
      详细更新内容请查看 [CHANGELOG.md](../README.md#更新日志)
    
    assets:
      links:
        - name: 'Windows 版本'
          url: "${PACKAGE_REGISTRY_URL}/$CI_COMMIT_TAG/图像分类工具_v${CI_COMMIT_TAG#v}.exe"
          filepath: '/图像分类工具.exe'
          link_type: 'package'

# 测试任务（可选）
test:
  stage: build
  script:
    - echo "运行项目测试..."
    - pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
    
    # 语法检查
    - python -m py_compile main.py
    - python -m py_compile run.py
    - python -c "import image_classifier; print('✓ 模块导入测试通过')"
    
    # 依赖检查
    - python -c "import PyQt6; print('✓ PyQt6 可用')"
    - python -c "import cv2; print('✓ OpenCV 可用')"
    - python -c "import PIL; print('✓ Pillow 可用')"
    - python -c "import psutil; print('✓ psutil 可用')"
    
    echo "✅ 所有测试通过"
  
  rules:
    # 在合并请求和主分支推送时运行测试
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
