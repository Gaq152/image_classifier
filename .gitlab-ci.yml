# 图像分类工具 - GitLab CI/CD 配置
# 支持 Windows 构建和自动发布

image: registry.desauto.cn/ops/python:3.10.14-bookworm

stages:
  - build
  - deploy

variables:
  # 包注册表配置
  PACKAGE_REGISTRY_URL: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/image_classifier"
  # 应用信息
  APP_NAME: "图像分类工具"
  APP_VERSION: "5.3.0"

# 部署条件：仅在推送标签时执行
.is_deploy:
  rules:
    - if: $CI_COMMIT_TAG

# Windows 构建任务
windows_build:
  stage: build
  extends:
    - .is_deploy
  tags:
    - win  # 需要 Windows Runner
  before_script:
    # 设置编码避免中文问题
    - chcp 65001
    - $env:PYTHONIOENCODING="utf-8"
  script:
    # 创建构建目录
    - mkdir -Force dist
    
    # 检查 Python 版本
    - python --version
    - pip --version
    
    # 安装依赖
    - echo "安装项目依赖..."
    - pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple --trusted-host pypi.tuna.tsinghua.edu.cn
    
    # 安装 PyInstaller
    - echo "安装 PyInstaller..."
    - pip install pyinstaller -i https://pypi.tuna.tsinghua.edu.cn/simple --trusted-host pypi.tuna.tsinghua.edu.cn
    
    # 动态更新版本号（如果有标签）
    - |
      if ($env:CI_COMMIT_TAG) {
        $version = $env:CI_COMMIT_TAG -replace '^v', ''
        echo "更新版本号为: $version"
        
        # 更新 __init__.py 中的版本号
        (Get-Content __init__.py) -replace '__version__ = "[^"]*"', "__version__ = `"$version`"" | Set-Content __init__.py
        
        # 更新 main.py 中的版本号
        (Get-Content main.py) -replace '版本: \d+\.\d+\.\d+', "版本: $version" | Set-Content main.py
        
        # 更新 ui/main_window.py 中的版本号
        (Get-Content ui/main_window.py) -replace 'self\.version = "[^"]*"', "self.version = `"$version`"" | Set-Content ui/main_window.py
      }
    
    # 执行构建
    - echo "开始构建可执行文件..."
    - python build.py
    
    # 检查构建结果
    - |
      $exeFile = Get-ChildItem -Path "dist" -Filter "*.exe" | Select-Object -First 1
      if ($exeFile) {
        $size = [math]::Round($exeFile.Length / 1MB, 1)
        echo "✓ 构建成功! 文件: $($exeFile.Name), 大小: ${size}MB"
        
        # 重命名为标准格式（如果有标签版本）
        if ($env:CI_COMMIT_TAG) {
          $version = $env:CI_COMMIT_TAG -replace '^v', ''
          $newName = "图像分类工具_v${version}.exe"
          if ($exeFile.Name -ne $newName) {
            Rename-Item -Path $exeFile.FullName -NewName $newName
            echo "✓ 文件已重命名为: $newName"
          }
        }
      } else {
        echo "✗ 构建失败，未找到exe文件"
        exit 1
      }
  
  artifacts:
    name: "image_classifier_$CI_COMMIT_TAG"
    paths:
      - dist/*.exe
    expire_in: 1 week
    reports:
      # 生成构建报告
      artifacts: dist/*.exe

