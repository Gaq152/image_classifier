# 图像分类工具 - GitLab CI/CD 配置
# 支持 Windows 构建和自动发布

image: registry.desauto.cn/ops/python:3.10.14-bookworm

# 工作流规则：在 MR、标签和默认分支上运行
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - build
  - deploy

variables:
  # 包注册表配置（上传和下载都用这个URL）
  # See https://docs.gitlab.com/ee/user/packages/generic_packages/#publish-a-package-file
  PACKAGE_REGISTRY_URL: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/image_classifier"
  # 应用信息
  APP_NAME: "图像分类工具"
  APP_VERSION: "${CI_COMMIT_TAG#v}"

# 部署条件：仅在推送标签时执行
.is_deploy:
  rules:
    - if: $CI_COMMIT_TAG

# Windows 构建任务
windows_build:
  stage: build
  extends:
    - .is_deploy
  tags:
    - win  # 需要 Windows Runner
  before_script:
    # 设置编码避免中文问题
    - chcp 65001
    - $env:PYTHONIOENCODING="utf-8"
  script:
    - mkdir -Force dist
    - pip install -r requirements.txt pyinstaller -i https://pypi.tuna.tsinghua.edu.cn/simple --trusted-host pypi.tuna.tsinghua.edu.cn
    - if ($env:CI_COMMIT_TAG) { $version = $env:CI_COMMIT_TAG -replace '^v', ''; (Get-Content _version_.py) -replace '__version__ = "[^"]*"', "__version__ = `"$version`"" | Set-Content _version_.py }
    - python build.py
    - $exe = Get-ChildItem -Path "dist" -Filter "*.exe" | Select-Object -First 1
    - if (-not $exe) { echo "构建失败"; exit 1 }
    - if ($env:CI_COMMIT_TAG) { $v = $env:CI_COMMIT_TAG -replace '^v', ''; Rename-Item $exe.FullName "图像分类工具_v$v.exe" -Force }
    - echo "✓ 构建完成"
  
  artifacts:
    name: "image_classifier_$CI_COMMIT_TAG"
    paths:
      - dist/*.exe
    expire_in: 1 week

# 上传文件任务
upload:
  stage: deploy
  extends:
    - .is_deploy
  dependencies:
    - windows_build
  script:
    - WINDOWS_FILE=$(ls -1 dist/*.exe | head -1)
    - 'test -f "$WINDOWS_FILE" || { echo "未找到exe文件"; exit 1; }'
    - VERSION=${CI_COMMIT_TAG#v}
    - SAFE_FILENAME="ImageClassifier_v${VERSION}.exe"
    - 'curl --fail -X PUT --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --data-binary "@$WINDOWS_FILE" "${PACKAGE_REGISTRY_URL}/${VERSION}/${SAFE_FILENAME}"'
    - 'curl --fail -X PUT --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --data-binary "@$WINDOWS_FILE" "${PACKAGE_REGISTRY_URL}/latest/${SAFE_FILENAME}"'
    # 计算 sha256
    - 'sha256sum "$WINDOWS_FILE" | awk "{print \$1}" > dist/${SAFE_FILENAME}.sha256'
    - SHA256=$(cat dist/${SAFE_FILENAME}.sha256)
    # 生成 manifest.json
    - SIZE_BYTES=$(stat -c %s "$WINDOWS_FILE")
    # 从_version_.py提取版本更新说明
    - |
      UPDATE_NOTES=$(python3 -c "
      import sys
      sys.path.append('.')
      from _version_ import VERSION_HISTORY

      # 查找当前版本的更新说明
      current_version = '${VERSION}'
      notes = 'CI 自动生成'

      for version_info in VERSION_HISTORY:
          if version_info['version'] == current_version:
              # 使用版本标题和前3个亮点作为更新说明
              title = version_info.get('title', '版本更新')
              highlights = version_info.get('highlights', [])
              notes = f'{title}\\n'
              for i, highlight in enumerate(highlights[:3]):
                  notes += f'• {highlight}\\n'
              if len(highlights) > 3:
                  notes += '• ...等更多功能改进'
              break

      print(notes)
      ")
    - |
      cat > dist/manifest.json <<MANI
      {
        "version": "${VERSION}",
        "date": "${CI_COMMIT_TIMESTAMP%%T*}",
        "url": "${PACKAGE_REGISTRY_URL}/${VERSION}/${SAFE_FILENAME}",
        "display_name": "图像分类工具_v${VERSION}.exe",
        "sha256": "${SHA256}",
        "size_bytes": ${SIZE_BYTES},
        "notes": "${UPDATE_NOTES}"
      }
      MANI
    - 'curl --fail -X PUT --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --data-binary "@dist/manifest.json" "${PACKAGE_REGISTRY_URL}/${VERSION}/manifest.json"'
    - 'curl --fail -X PUT --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --data-binary "@dist/manifest.json" "${PACKAGE_REGISTRY_URL}/latest/manifest.json"'
    - echo "✓ 版本 $VERSION 上传成功，并已生成 manifest.json"
    - echo "RELEASE_VERSION=${VERSION}" >> release.env
    - echo "RELEASE_FILENAME=${SAFE_FILENAME}" >> release.env
  artifacts:
    reports:
      dotenv: release.env

# GitLab Release 创建任务
release:
  stage: deploy
  image: registry.gddi.com/ops/release-cli:v0.14.0
  extends:
    - .is_deploy
  dependencies:
    - upload
  needs:
    - job: upload
      artifacts: true
  script:
    - echo "创建 GitLab Release..."
  release:
    tag_name: $CI_COMMIT_TAG
    name: '图像分类工具 $CI_COMMIT_TAG'
    description: |
      ## 🚀 图像分类工具 $CI_COMMIT_TAG 发布
      
      ### 📥 下载链接
      - **Windows 版本**: [$RELEASE_FILENAME]($PACKAGE_REGISTRY_URL/$RELEASE_VERSION/$RELEASE_FILENAME)
      - **最新版本**: [$RELEASE_FILENAME]($PACKAGE_REGISTRY_URL/latest/$RELEASE_FILENAME)
      
      ### 📋 系统要求
      - **操作系统**: Windows 7 及以上版本
      - **内存**: 4GB RAM 以上
      - **存储**: 200MB 可用空间
      
      ### 🎯 主要功能
      - 🖼️ 支持多种图片格式
      - 📁 智能分类管理
      - ⌨️ 丰富快捷键支持
      - 🔄 复制/移动双模式
      - 🎨 现代化用户界面
      
      ### 📝 更新说明
      详细更新内容请查看 [CHANGELOG.md](https://gitlab.desauto.cn/rd/delivery/data_process/image_classifier/-/blob/main/CHANGELOG.md)
    
    assets:
      links:
        - name: 'Windows 版本'
          url: "$PACKAGE_REGISTRY_URL/$RELEASE_VERSION/$RELEASE_FILENAME"
          link_type: 'package'

# 测试任务（可选）
test:
  stage: build
  script:
    - pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
    - python -m py_compile main.py run.py
    - python -c "import PyQt6, PIL, psutil; print('✅ 核心依赖检查通过')" && (python -c "import cv2" || echo "⚠️ OpenCV跳过")
  allow_failure: true  # 允许失败，不阻塞后续阶段
  
  # 测试任务会根据 workflow 规则自动运行
