<h3 style="color: {{text_primary}}; margin-top: 4px;">主要功能</h3>

<div style="background-color: {{bg_hover}}; padding: 16px; border-left: 4px solid {{primary}}; margin: 12px 0;">
<ul style="margin: 0; padding-left: 20px; line-height: 1.8; color: {{text_primary}};">
<li><b>快速分类</b>：支持快捷键、单分类与多分类，分类后可自动跳转</li>
<li><b>图片浏览</b>：支持适应窗口、原始大小、缩放与拖拽查看</li>
<li><b>文件处理</b>：支持复制或移动分类，并可撤销分类和移出操作</li>
<li><b>大列表处理</b>：通过预加载和增量刷新流畅处理大量图片</li>
<li><b>网络目录</b>：支持 SMB/NAS 路径、图片缓存和缓存预热</li>
<li><b>状态同步</b>：自动保存分类状态、当前位置和窗口状态</li>
</ul>
</div>
